<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="admin/include :: header('更新记录列表')" />
    <th:block th:include="admin/include :: select2-css" />
</head>
<body class="gray-bg">
     <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="formId">
                    <div class="select-list">
                        <ul>

                            <li>
                                <label>公众号名称：</label>
                                <input type="text" name="feedName"/>
                            </li>
                            <li>
                                <label>执行类型：</label>
                                <select name="logCatagory" id="logCatagory" >
                                    <option value="" >全部</option>
                                    <option value="1" >定时任务</option>
                                    <option value="2" >最新同步更新</option>
                                    <option value="3" >历史更新</option>
                                </select>
                            </li>
                            <li>
                                <label>执行状态：</label>
                                <select name="logSta" id="logSta" >
                                    <option value="" >全部</option>
                                    <option value="1" >执行中</option>
                                    <option value="2" >执行结束</option>>
                                </select>
                            </li>
                            <li>
                                <a class="btn el-primary" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                                <a class="btn el-info-plain" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>

            <div class="btn-group-sm" id="toolbar" role="group">

            </div>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="admin/include :: footer" />
    <th:block th:include="admin/include :: select2-js" />
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('cms:updateLog:edit')}]];
        var removeFlag = [[${@permission.hasPermi('cms:updateLog:remove')}]];
        var prefix = ctx + "cms/updateLog";

        $(function() {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                importUrl: prefix + "/importData",
                importTemplateUrl: prefix + "/importTemplate",
                modalName: "更新记录",
                columns: [
                    {
                        checkbox: true
                    },
                    {
                        field: 'logId',
                        title: '日志主键',
                        visible: false
                    },
                    {
                        field: 'logCatagory',
                        title: '执行类型',
                        width: '300px',
                        formatter: function(value, row, index) {
                            if (value == "1") {
                                return '定时任务'
                            }else   if (value == "2") {
                                return '最新同步更新:'+row.feedName
                            }else   if (value == "3") {
                                return '历史更新:'+row.feedName
                            }
                        }
                    },
                    {
                        field: 'logSta',
                        title: '状态',
                        formatter: function(value, row, index) {
                            if (value == "1") {
                                return '<i class="layui-icon layui-icon-loading layui-anim layui-anim-rotate layui-anim-loop">'
                            }else   if (value == "2") {
                                return '<span class="badge badge-primary"  >执行结束</span>'
                            }
                        }
                    },
                    {
                        field: 'logResultSta',
                        title: '执行结果',
                        formatter: function(value, row, index) {
                            if (value == "1") {
                                return '<span class="badge badge-primary" >正常</span>'
                            }else   if (value == "2") {
                                return '<span class="badge badge-danger"  >异常</span>'
                            }
                        }
                    },
                    {
                        field: 'updateNum',
                        title: '更新成功条数'
                    },
                    {
                        field: 'remark',
                        title: '信息'
                    },
                    {
                        field: 'historyStartNum',
                        title: '历史更新开始页数'
                    },
                    {
                        field: 'historyEndNum',
                        title: '历史更新结束页数'
                    },
                    {
                        field: 'createTime',
                        title: '操作时间',
                        width: '200px',
                    },
                    {
                        title: '操作',
                        align: 'center',
                        formatter: function(value, row, index) {
                            var actions = [];
                            // actions.push('<a class="btn btn-xs el-primary-text ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.logId + '\')"><i class="fa fa-pencil"></i> 编辑</a> ');
                            actions.push('<a class="btn btn-xs el-primary-text ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.logId + '\')"><i class="fa fa-trash-o"></i> 删除</a>');
                            return actions.join('');
                        }
                    }
                ]
            };
            $.table.init(options);
        });
    </script>
    <!-- 导入区域 -->
    <script id="importTpl" type="text/template">
     <form enctype="multipart/form-data" class="mt20 mb10">
         <div class="col-xs-offset-1">
             <input type="file" id="file" name="file"/>
             <div class="mt10 pt5">
                 <input type="checkbox" id="updateSupport" name="updateSupport" title="如果数据已经存在，更新这条数据。"> 是否更新已经存在的数据
                 &nbsp;	<a onclick="$.table.importTemplate()" class="btn btn-default btn-xs"><i class="fa fa-file-excel-o"></i> 下载模板</a>
             </div>
             <font color="red" class="pull-left mt10">
                 提示：仅允许导入“xls”或“xlsx”格式文件！
             </font>
         </div>
     </form>
    </script>
</body>
</html>
