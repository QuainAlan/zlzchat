<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="admin/include :: header('文章信息列表')" />
    <th:block th:include="admin/include :: select2-css" />
    <th:block th:include="admin/include :: layout-latest-css" />
    <th:block th:include="admin/include :: ztree-css" />
    <th:block th:include="admin/include :: element-css" />
    <style>

     .ico_docu{
         background-size: cover!important;
     }
     .ztree *{
         font-size: 16px!important;
     }
     .ztree li a{
         height:50px!important;
     }
     .ztree li span.button{
         width:50px!important;
         height: 50px!important;
     }
     .roots_docu {
         display: none!important;
     }
      .bottom_docu{
         display: none!important;
     }
     .center_docu{
         display: none!important;
     }
      .level0{
          margin-bottom: 5px!important;
      }
      .root_docu{
          display: none!important;
      }
      #toolbar{
          display: none;
      }
     .v-modal{
         opacity: 0!important;
     }
    </style>
</head>
<body class="gray-bg">
<div class="ui-layout-west">
    <div class="box box-main">
        <div class="box-header">
            <div class="box-title">
                公众号列表
            </div>
            <div class="box-tools pull-right">
                <a type="button" class="btn btn-box-tool" href="javascript:void(0)" onclick="feed()" title="添加用户"><i class="fa fa-edit"></i></a>
                <button type="button" class="btn btn-box-tool" id="btnRefresh" title="刷新公众号"><i class="fa fa-refresh"></i></button>
            </div>
        </div>
        <div class="ui-layout-content">
            <input type="text" name="title" id="searchZTree" class="form-control"/>
            <div id="tree" class="ztree"></div>
        </div>
    </div>
</div>

<div class="ui-layout-center" >
     <div class="container-div"  id="app">
         <el-dialog
                 title="历史同步"
                 :visible.sync="hisDialog"
                 width="30%">
             <el-radio v-model="hisType" label="1">全部拉取（由数据库存储最后拉取页）</el-radio>
             <el-radio v-model="hisType" label="2">自定义</el-radio>
             <br/>
             <div v-if="hisType==2">
                 开始页
                 <el-input-number v-model="startNum" :min="0" :step="20" step-strictly  label="开始数字（代表开始页数只能是20的倍数）"></el-input-number>
                 结束页
                 <el-input-number v-model="endNum"  :min="0" :step="20"  step-strictly label="结束数字（代表结束页数只能是20的倍数）"></el-input-number>
             </div>

             <span slot="footer" class="dialog-footer">
            <el-button @click="hisDialog = false">取 消</el-button>
            <el-button type="primary" @click="hisUpdate()">确 定</el-button>
            </span>
         </el-dialog>

        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="formId">
                    <div class="select-list">
                        <ul>
                            <input type="hidden" id="wxsId" name="wxsId"/>
                            <li>
                                <label> 文章标题：</label>
                                <input type="text" name="title"/>
                            </li>
                            <li>
                                <select name="readType" id="readType" >
                                    <option value="" th:selected="${readTypeVal eq ''}">全部</option>
                                    <option value="0" th:selected="${readTypeVal eq '0'}">未读</option>
                                    <option value="1" th:selected="${readTypeVal eq '1'}">已读</option>
                                </select>
                             </li>
                            <li>
                                <a class="btn el-primary" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                                <a class="btn el-info-plain" onclick="reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>




            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn el-primary" onclick="getFeedArticleNew()" shiro:hasPermission="cms:accounts:add">
                    <i class="fa fa-plus"></i> 最新拉取
                </a>
                <a class="btn el-primary" onclick="getFeedArticle()" shiro:hasPermission="cms:accounts:add">
                    <i class="fa fa-plus"></i> 历史拉取
                </a>
            </div>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>


    </div>
</div>
    <th:block th:include="admin/include :: footer" />
<th:block th:include="admin/include :: layout-latest-js" />
<th:block th:include="admin/include :: element-js" />
    <th:block th:include="admin/include :: select2-js" />
<th:block th:include="admin/include :: ztree-js" />
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('cms:mparticles:edit')}]];
        var removeFlag = [[${@permission.hasPermi('cms:mparticles:remove')}]];
        var prefix = ctx + "cms/mparticles";

        $(function() {
            var panehHidden = false;
            if ($(this).width() < 769) {
                panehHidden = true;
            }
            $('body').layout({ initClosed: panehHidden, west__size: 285, resizeWithWindow: false });
            // 回到顶部绑定
            if ($.fn.toTop !== undefined) {
                var opt = {
                    win:$('.ui-layout-center'),
                    doc:$('.ui-layout-center')
                };
                $('#scroll-up').toTop(opt);
            }
            queryArticleList();
            queryDeptTree();
            $("#searchZTree").on("input", function () {
                var keyword  = $(this).val().toLowerCase().replaceAll(" ","");
                var zTree = $.fn.zTree.getZTreeObj("tree");

                // 获取所有节点
                var allNodes = zTree.transformToArray(zTree.getNodes());

                // 先显示所有节点（避免上次搜索的影响）
                zTree.showNodes(allNodes);

                if (keyword) {
                    // 获取匹配的节点（模糊搜索）
                    var matchedNodes = zTree.getNodesByParamFuzzy("name", keyword);

                    // 隐藏不匹配的节点
                    $.each(allNodes, function(i, node) {
                        if ($.inArray(node, matchedNodes) === -1) {
                            zTree.hideNode(node, true); // true表示不触发回调
                        }
                    });

                    // 展开所有匹配节点（可选）
                    $.each(matchedNodes, function(i, node) {
                        zTree.expandNode(node.getParentNode(), true, false, true);
                    });
                }
            })
        });



        /* 用户管理-部门 */
        function feed() {
            var url = ctx + "cms/feeds";
            $.modal.openTab("公众号信息", url);
        }

        function queryArticleList() {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                importUrl: prefix + "/importData",
                importTemplateUrl: prefix + "/importTemplate",
                pageSize: 50,
                pageList:[50,100,200],
                modalName: "文章信息",
                columns: [
                    {
                        checkbox: true
                    },
                    {
                        field: 'articlesId',
                        title: '',
                        visible: false
                    },
                    {
                        field: 'title',
                        title: '标题'
                    },
                    {
                        field: 'mpName',
                        title: '公众号'
                    },
                    // {
                    //     field: 'picUrl',
                    //     title: '封面',
                    //     width: '100',
                    //     formatter: function(value, row, index) {
                    //         return "<img style='width:100px;' src='"+ value +"'>";
                    //     }
                    // },
                    {
                        field: 'originalId',
                        title: '短链地址'
                    },
                    {
                        field: 'readType',
                        title: '阅读状态',
                        formatter: function(value, item, index) {
                            if (value == '0') {
                                return '<span class="badge badge-danger">未读</span>';
                            }
                            else if (value == '1') {
                                return '<span class="badge badge-success">已读</span>';
                            }

                        }
                    },
                    {
                        field: 'publishTime',
                        title: '创建时间'
                    },
                    {
                        title: '操作',
                        align: 'center',
                        formatter: function(value, row, index) {
                            var actions = [];
                            // actions.push('<a class="btn btn-xs el-primary-text ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.articlesId + '\')"><i class="fa fa-pencil"></i> 编辑</a> ');
                            // actions.push('<a class="btn btn-xs el-primary-text ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.articlesId + '\')"><i class="fa fa-trash-o"></i> 删除</a>');
                            actions.push('<a class="btn el-primary-text btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="goUrl(\'' + row.originalId + '\',\'' + row.articlesId + '\')"> 查看</a> ');
                            actions.push('<a class="btn el-primary-text btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="goLxUrl(\'' + row.articlesId + '\')"> 本地查看</a> ');
                            actions.push('<a class="btn el-primary-text btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="goCont(\'' + row.articlesId + '\')"> 获取正文</a> ');
                            return actions.join('');
                        }
                    }
                ]
            };
            $.table.init(options);
        };

        function goUrl(originalId,articlesId){
            $.ajax({
                type : "post",
                url : "/admin/cms/mparticles/edit",
                data: { "articlesId": articlesId,"readType":"1" },
                success : function(res) {
                    if(res.code=="0"){
                        $.table.search();
                    }
                }
            });
            window.open("https://mp.weixin.qq.com/s/"+originalId, '_blank');

        }
        function goLxUrl(articleId){
            window.open('/admin/cms/mparticles/wxArticle/'+articleId, '_blank');

        }
        function goCont(articleId){
            $.ajax({
                type : "get",
                url : "/admin/cms/mparticles/goCont/"+articleId,
                success : function(res) {
                 if(res.code=="0"){
                     $.modal.msgSuccess(res.msg)
                 }else{
                     $.modal.msgError(res.msg)
                 }
                }
            });
        }

        function queryDeptTree()
        {
            var url = ctx + "/cms/feeds/feedTreeData";
            var options = {
                url: url,
                expandLevel: 2,
                onClick : zOnClick
            };
            $.tree.init(options);
            $("#wxsId").val("");

            function zOnClick(event, treeId, treeNode) {
                $("#wxsId").val(treeNode.txtId);
                $("#toolbar").css("display", "block");

                $.table.search();

            }
        }

        $('#btnExpand').click(function() {
            $._tree.expandAll(true);
            $(this).hide();
            $('#btnCollapse').show();
        });

        $('#btnCollapse').click(function() {
            $._tree.expandAll(false);
            $(this).hide();
            $('#btnExpand').show();
        });

        $('#btnRefresh').click(function() {
            reset();
        });

        /* 自定义重置-表单重置/隐藏框/树节点选择色/搜索 */
        function resetPre() {
            resetDate();
            $("#user-form")[0].reset();
            $("#deptId").val("");
            $("#parentId").val("");
            $(".curSelectedNode").removeClass("curSelectedNode");
            $.table.search();
        }

        function reset(){
            $("#wxsId").val("");
            $("#toolbar").css("display", "none");
            $.form.reset();
            queryDeptTree();
        }



        function getFeedArticle(){
            app.getFeedArticle();
        }

        function getFeedArticleNew(){
            app.getFeedArticleNew();
        }


        var app = new Vue({
            el:'#app',
            data:function () {
                return {
                    hisDialog:false,
                    hisType:"1",
                    wxsId:"",
                    startNum:0,
                    endNum:20
                }
            },
            created: function () {


            },
            methods: {
                getFeedArticle(){
                    let that=this;
                    let wxsId= $("#wxsId").val();
                    that.wxsId=wxsId;
                    that.hisDialog=true;
                    // const loading =   that.$loading({
                    //         lock: true,
                    //         text: '发起成功，因历史请求过久，会先退出等待，请刷新文章数量查看是否增加...',
                    //         spinner: 'el-icon-loading',
                    //         background: 'rgba(0, 0, 0, 0.7)'
                    //     });
                    // setTimeout(() => {
                    //     loading.close();
                    // }, 5000);
                    // $.ajax({
                    //     url: "/admin/cms/mparticles/getFeedArticle/"+wxsId,
                    //     type: 'post',
                    //     dataType: "json",
                    //     success: function(result) {
                    //         if(result.code==0){
                    //             $.modal.msgSuccess(result.msg)
                    //         }else{
                    //             $.modal.msgError(result.msg)
                    //         }
                    //
                    //     }
                    // })
                },
                getFeedArticleNew(){
                    let that=this;
                    let wxsId= $("#wxsId").val();
                    const loading =   that.$loading({
                        lock: true,
                        text: '正在获取最新文章...',
                        spinner: 'el-icon-loading',
                        background: 'rgba(0, 0, 0, 0.7)'
                    });
                    $.ajax({
                        url: "/admin/cms/mparticles/getFeedArticleNew/"+wxsId,
                        type: 'post',
                        dataType: "json",
                        success: function(result) {
                            loading.close();
                            if(result.code==0){
                                $.modal.msgSuccess(result.msg)
                            }else{
                                $.modal.msgError(result.msg)
                            }

                        }
                    })
                },
                hisUpdate(){
                    let that=this;
                    const loading =  that.$loading({
                        lock: true,
                        text: '正在请求同步，请稍候...',
                        spinner: 'el-icon-loading',
                        background: 'rgba(0, 0, 0, 0.7)'
                    });
                    that.hisDialog=false;
                    $.ajax({
                        url: "/admin/cms/mparticles/getFeedArticle/"+that.wxsId,
                        type: 'post',
                        dataType: "json",
                        data: { "startNum": that.startNum,"endNum": that.endNum,"hisType":that.hisType },
                        success: function(result) {
                            loading.close();
                            if(result.code==0){
                                $.modal.msgSuccess(result.msg)
                            }else{
                                $.modal.msgError(result.msg)
                            }

                        }
                    })
                }

            }
        })

    </script>
    <!-- 导入区域 -->
    <script id="importTpl" type="text/template">
     <form enctype="multipart/form-data" class="mt20 mb10">
         <div class="col-xs-offset-1">
             <input type="file" id="file" name="file"/>
             <div class="mt10 pt5">
                 <input type="checkbox" id="updateSupport" name="updateSupport" title="如果数据已经存在，更新这条数据。"> 是否更新已经存在的数据
                 &nbsp;	<a onclick="$.table.importTemplate()" class="btn btn-default btn-xs"><i class="fa fa-file-excel-o"></i> 下载模板</a>
             </div>
             <font color="red" class="pull-left mt10">
                 提示：仅允许导入“xls”或“xlsx”格式文件！
             </font>
         </div>
     </form>
    </script>
</body>
</html>
